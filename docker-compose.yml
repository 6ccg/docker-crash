services:
  shellcrash:
    build:
      context: .
    image: ghcr.io/6ccg/docker-crash:latest
    container_name: shellcrash
    restart: unless-stopped
    ports:
      - "7890:7890/tcp"
      - "7890:7890/udp"
      - "9999:9999/tcp"
    volumes:
      - ./data:/data:rw
    environment:
      CRASHDIR: /etc/ShellCrash
      SHELLCRASH_DATADIR: /data
      TZ: Asia/Shanghai
